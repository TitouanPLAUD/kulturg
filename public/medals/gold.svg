<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 84" fill="none">
  <defs>
    <linearGradient id="g-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4b8ef8"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="g-disc" cx="38%" cy="32%" r="75%">
      <stop offset="0" stop-color="#fff6cf"/>
      <stop offset="0.45" stop-color="#ffd24a"/>
      <stop offset="0.8" stop-color="#e8a317"/>
      <stop offset="1" stop-color="#a8710c"/>
    </radialGradient>
    <linearGradient id="g-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset="1" stop-color="#9a650a"/>
    </linearGradient>
    <radialGradient id="g-face" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#fde79a"/>
      <stop offset="1" stop-color="#c98a10"/>
    </radialGradient>
    <filter id="g-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.4" flood-color="#ffce4a" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Ruban -->
  <path d="M21 34 L31 31 L23 5 L13 8 Z" fill="url(#g-ribbon)"/>
  <path d="M43 34 L33 31 L41 5 L51 8 Z" fill="url(#g-ribbon)"/>
  <path d="M13 8 L23 5 L20 11 L16 12 Z" fill="#173a8f" opacity="0.55"/>
  <path d="M51 8 L41 5 L44 11 L48 12 Z" fill="#173a8f" opacity="0.55"/>

  <!-- Disque -->
  <g filter="url(#g-glow)">
    <circle cx="32" cy="54" r="25" fill="url(#g-rim)"/>
    <circle cx="32" cy="54" r="22.5" fill="url(#g-disc)"/>
    <circle cx="32" cy="54" r="22.5" fill="none" stroke="#7d5408" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Cadran minuit -->
  <circle cx="32" cy="54" r="16" fill="url(#g-face)" stroke="#8a5d08" stroke-width="1"/>
  <g fill="#6e4905">
    <rect x="31" y="40" width="2" height="3.2" rx="1"/>
    <rect x="31" y="64.8" width="2" height="3.2" rx="1"/>
    <rect x="18" y="53" width="3.2" height="2" rx="1"/>
    <rect x="42.8" y="53" width="3.2" height="2" rx="1"/>
  </g>
  <!-- Aiguilles à minuit (12:00) -->
  <g stroke="#5c3c03" stroke-linecap="round">
    <line x1="32" y1="54" x2="32" y2="44.5" stroke-width="2.2"/>
    <line x1="32" y1="54" x2="32" y2="47" stroke-width="2.6"/>
  </g>
  <circle cx="32" cy="54" r="2" fill="#5c3c03"/>

  <!-- Reflet -->
  <path d="M20 42 Q26 36 36 38 Q28 40 24 47 Z" fill="#ffffff" opacity="0.35"/>
</svg>
